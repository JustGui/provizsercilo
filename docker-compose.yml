services:
  # -----------------------------------------------------------------------
  # Main search router
  # -----------------------------------------------------------------------
  proviz-sercilo:
    build: .
    image: proviz-sercilo:latest
    ports:
      - "${PORT:-8090}:8090"
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      CACHE_TTL_SECS: ${CACHE_TTL_SECS:-3600}
      MAX_FALLBACKS: ${MAX_FALLBACKS:-3}
      # Set to a postgres:// URL to use PostgreSQL instead of SQLite
      DATABASE_URL: ${DATABASE_URL:-}
      DATABASE_PATH: ${DATABASE_PATH:-/data/proviz.db}
      # Provider keys - resolved by key_ref at search time
      BRAVE_KEY_1: ${BRAVE_KEY_1:-}
      TAVILY_KEY_1: ${TAVILY_KEY_1:-}
      MOJEEK_KEY_1: ${MOJEEK_KEY_1:-}
      SERPER_KEY_1: ${SERPER_KEY_1:-}
      # SearXNG and DDG bridge URLs stored as key_ref values
      SEARXNG_INSTANCE_1: http://searxng:8080
      DDG_BRIDGE_1: http://ddg-bridge:8001
    volumes:
      - proviz-data:/data
      - ./profiles.toml:/etc/proviz-sercilo/profiles.toml:ro
    depends_on:
      - searxng
      - ddg-bridge
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # SearXNG - self-hosted meta-search engine
  # -----------------------------------------------------------------------
  searxng:
    build: ./searxng
    ports:
      - "8080:8080"
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
    volumes:
      - searxng-data:/etc/searxng
    depends_on:
      - tor
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Tor - SOCKS5 proxy for SearXNG outgoing requests (avoids rate limits)
  # -----------------------------------------------------------------------
  tor:
    image: dockurr/tor:latest
    command: --SocksPort 0.0.0.0:9050
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # DDG Bridge - Python duckduckgo-search HTTP wrapper
  # -----------------------------------------------------------------------
  ddg-bridge:
    build: ./bridges/ddgs-bridge
    image: ddg-bridge:latest
    ports:
      - "8001:8001"
    environment:
      PORT: "8001"
      SAFESEARCH: moderate
      BACKEND_ORDER: ${BACKEND_ORDER:-yandex,mojeek,startpage,yahoo,google,duckduckgo,brave}
    restart: unless-stopped

volumes:
  proviz-data:
  searxng-data:
